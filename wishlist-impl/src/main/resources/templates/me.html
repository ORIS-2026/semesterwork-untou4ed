<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>
<div class="page">

    <div id="error" class="error hidden"></div>

    <div id="tabs-bar" class="tabs hidden" style="margin-bottom:24px;">
        <button class="tab active" data-tab="profile">Профиль</button>
        <button class="tab" data-tab="wishlist">Вишлист</button>
        <button class="tab" data-tab="followers">Подписчики <span id="followersCountBadge" class="badge" style="margin-left:6px; font-size:12px; padding:2px 8px;">0</span></button>
    </div>

    <div id="profile" class="tab-panel hidden">
        <h2>Мой профиль</h2>

        <div class="avatar-wrapper">
            <img id="avatarImg" class="avatar-img" src="" alt="Аватар">
            <label class="avatar-edit-btn" for="avatarInput" title="Изменить фото">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>
            </label>
            <input type="file" id="avatarInput" accept="image/*" style="display:none">
            <div id="avatarLoader" class="avatar-loader hidden"></div>
        </div>
        <p id="avatarError" class="error hidden" style="margin-top:8px; font-size:13px;"></p>

        <div class="profile-info">
            <p><strong>Имя пользователя:</strong> <span id="profileUsername"></span></p>
            <p><strong>Имя:</strong> <span id="profileName"></span></p>
            <p><strong>Фамилия:</strong> <span id="profileSurname"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Телефон:</strong> <span id="profilePhone"></span></p>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
            <button id="logoutBtn" class="btn-danger">Выйти</button>
            <button id="deleteAccountBtn" class="btn-delete-account">Удалить аккаунт</button>
        </div>
    </div>

    <div id="wishlist-section" class="tab-panel hidden">
        <div class="page-header">
            <h2 id="wishlistTitle"></h2>
            <div class="form-row">
                <button id="editWishlistBtn" class="btn-primary">Редактировать</button>
                <button onclick="openGiftModal()" class="btn-primary">+ Добавить подарок</button>
            </div>
        </div>
        <p id="wishlistDesc" class="muted" style="margin-bottom:16px;"></p>
        <div id="gifts-list" class="card-list"></div>
    </div>

    <div id="followers-section" class="tab-panel hidden">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
            <h2 style="margin:0;">Подписчики</h2>
            <span class="badge" id="followersTotal">0</span>
        </div>
        <div id="followers-list" class="card-list"></div>
    </div>

</div>

<div id="giftModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeGiftModal()">&times;</span>
        <h3>Добавить подарок</h3>
        <div id="giftError" class="error hidden"></div>
        <form id="addGiftForm">
            <input type="hidden" id="giftOwnerId">
            <input type="hidden" id="giftOwnerType">
            <label>Название *
                <input type="text" id="giftTitle" required>
            </label>
            <label>Описание
                <input type="text" id="giftDesc">
            </label>
            <label>Ссылка
                <input type="url" id="giftLink">
            </label>
            <label>Цена
                <input type="number" id="giftPrice" min="0" step="0.01">
            </label>
            <button type="submit" class="btn-primary" style="margin-top:8px;">Добавить</button>
        </form>
        <p id="giftSuccess" class="success hidden">Подарок добавлен!</p>
    </div>
</div>

<div id="editWishlistModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeEditWishlistModal()">&times;</span>
        <h3>Редактировать вишлист</h3>
        <form id="editWishlistForm">
            <label>Название
                <input type="text" id="wlTitle">
            </label>
            <label>Описание
                <textarea id="wlDesc" rows="3"></textarea>
            </label>
            <button type="submit" class="btn-primary" style="margin-top:8px;">Сохранить</button>
        </form>
    </div>
</div>

<div id="deleteAccountModal" class="modal">
    <div class="modal-content">
        <h3>Удалить аккаунт?</h3>
        <p style="margin:12px 0; color:#6b7280; font-size:14px;">
            Это действие необратимо. Все ваши данные будут удалены.
        </p>
        <div id="deleteAccountError" class="error hidden" style="margin-bottom:12px;"></div>
        <div class="form-row">
            <button id="confirmDeleteBtn" class="btn-danger">Да, удалить</button>
            <button id="cancelDeleteBtn">Отмена</button>
        </div>
    </div>
</div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/me.js}"></script>
</body>
</html>
