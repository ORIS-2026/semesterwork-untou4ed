<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="nav" class="nav">
    <a href="/feed">Лента</a>
    <a href="/groups">Группы</a>
    <a href="/subscriptions">Подписки</a>
    <a href="/me">Профиль</a>

    <div class="nav-auth" id="nav-auth"></div>

    <script>
        (function () {
            const token = localStorage.getItem('access_token');
            const el = document.getElementById('nav-auth');
            if (token) {
                el.innerHTML = '<button class="nav-logout-btn" onclick="(function(){localStorage.clear();window.location.href=\'/login\';})()">Выйти</button>';
            } else {
                el.innerHTML = '<a href="/login">Войти</a><a href="/register">Зарегистрироваться</a>';
            }
        })();
    </script>
</nav>
</body>
</html>
